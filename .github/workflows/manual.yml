name: Build and Release WOWLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore Launcher/Launcher.sln

    - name: Build solution
      run: msbuild Launcher/Launcher.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./Launcher/bin/Release/Launcher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
