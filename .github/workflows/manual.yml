name: Build and Release WOWLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore Launcher/Launcher.sln

    - name: Build solution
      run: msbuild Launcher/Launcher.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: WOWLauncher ${{ github.ref_name }}
        body: |
          🚀 Nueva versión compilada automáticamente.
          - Login automático
          - Actualización de parches
          - Noticias integradas
          - Configuración de realmlist
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./Launcher/bin/Release/Launcher.exe
        asset_name: Launcher.exe
        asset_content_type: application/octet-stream
