name: Build and Release WOWLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore Launcher/Launcher.sln

    - name: Build solution
      run: msbuild Launcher/Launcher.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Debug - Find and prepare executable
      run: |
        Write-Host "=== Searching for built files ==="
        Get-ChildItem -Path . -Recurse -Include "*.exe", "*.dll" | ForEach-Object { $_.FullName }
        
        Write-Host "=== Looking for Launcher.exe ==="
        $exePath = Get-ChildItem -Path "./Launcher/bin" -Recurse -Filter "Launcher.exe" | Select-Object -First 1
        
        if ($exePath) {
            Write-Host "Found executable at: $($exePath.FullName)"
            
            # Crear carpeta output
            New-Item -ItemType Directory -Force -Path "./output" | Out-Null
            
            # Copiar ejecutable y archivos relacionados
            Copy-Item -Path $exePath.FullName -Destination "./output/Launcher.exe" -Force
            
            # Copiar también archivos .dll y .config si existen
            $sourceDir = $exePath.Directory.FullName
            Get-ChildItem -Path $sourceDir -Include "*.dll", "*.config", "*.pdb" -Recurse | 
                Copy-Item -Destination "./output/" -Force
            
            Write-Host "Files copied to output folder:"
            Get-ChildItem -Path "./output"
        } else {
            Write-Error "Launcher.exe not found!"
            exit 1
        }

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./output/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
