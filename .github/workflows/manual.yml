name: Build and Release WOWLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión para la release (ej: v1.0.0)'
        required: true
        default: 'v1.2.3'
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Importante para obtener todos los tags

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore Launcher/Launcher.sln

    - name: Build solution
      run: msbuild Launcher/Launcher.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Prepare release files
      run: |
        Write-Host "=== Preparando archivos para release ===" -ForegroundColor Green
        
        # Crear carpeta para los archivos
        New-Item -ItemType Directory -Force -Path "./release" | Out-Null
        
        # Copiar ejecutable y archivos necesarios
        Write-Host "Copiando ejecutable..." -ForegroundColor Cyan
        Copy-Item -Path "./Launcher/bin/Release/Launcher.exe" -Destination "./release/" -Force
        
        Write-Host "Copiando archivos adicionales..." -ForegroundColor Cyan
        Copy-Item -Path "./Launcher/bin/Release/*.dll" -Destination "./release/" -ErrorAction SilentlyContinue
        Copy-Item -Path "./Launcher/bin/Release/*.config" -Destination "./release/" -ErrorAction SilentlyContinue
        Copy-Item -Path "./Launcher/bin/Release/*.pdb" -Destination "./release/" -ErrorAction SilentlyContinue
        
        # Determinar el nombre de la versión
        $version = "${{ github.event.inputs.version }}"
        if ([string]::IsNullOrEmpty($version)) {
          $version = "${{ github.ref_name }}"
        }
        if ([string]::IsNullOrEmpty($version)) {
          $version = "manual"
        }
        
        # Crear ZIP con todo (CORREGIDO)
        Write-Host "Creando archivo ZIP para versión: $version" -ForegroundColor Cyan
        Compress-Archive -Path "./release/*" -DestinationPath "./WOWLauncher-$version.zip" -Force
        
        # Mostrar archivos preparados
        Write-Host "`n=== Archivos preparados ===" -ForegroundColor Green
        Get-ChildItem "./release" | Format-Table Name, Length
        
        Write-Host "`n=== ZIP creado ===" -ForegroundColor Green
        Get-ChildItem "*.zip" | Format-Table Name, Length

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: WOWLauncher ${{ github.event.inputs.version || github.ref_name }}
        body: |
          # 🚀 WOWLauncher ${{ github.event.inputs.version || github.ref_name }}
          
          ## 📦 Archivos incluidos:
          - **Launcher.exe** ($(Get-Item ./release/Launcher.exe).Length/1KB KB)
          - **Launcher.pdb** (Archivo de depuración)
          - **Launcher.exe.config** (Configuración)
          - **DLLs necesarias** (incluidas en el ZIP)
          
          ## 📥 Descargas disponibles:
          - **Archivos individuales**: Cada archivo por separado
          - **WOWLauncher-${{ github.event.inputs.version || github.ref_name }}.zip**: Paquete completo
          
          ## ⚙️ Detalles del build:
          - **Fecha**: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          - **Commit**: ${{ github.sha }}
          - **Ejecutado por**: @${{ github.actor }}
          
          ## 🔗 Enlaces útiles:
          - [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [Ver commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
        files: |
          ./release/Launcher.exe
          ./release/Launcher.pdb
          ./release/Launcher.exe.config
          ./*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
