name: Build and Release WOWLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'true'
        type: boolean
      tag_name:
        description: 'Tag name for release (required if create_release is true)'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore Launcher/Launcher.sln

    - name: Build solution
      run: msbuild Launcher/Launcher.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Prepare artifacts
      run: |
        Write-Host "=== Preparando archivos ==="
        New-Item -ItemType Directory -Force -Path "./output" | Out-Null
        
        # Copiar ejecutable y archivos relacionados
        Copy-Item -Path "./Launcher/bin/Release/Launcher.exe" -Destination "./output/" -Force
        Copy-Item -Path "./Launcher/bin/Release/*.dll" -Destination "./output/" -ErrorAction SilentlyContinue
        Copy-Item -Path "./Launcher/bin/Release/*.config" -Destination "./output/" -ErrorAction SilentlyContinue
        Copy-Item -Path "./Launcher/bin/Release/*.pdb" -Destination "./output/" -ErrorAction SilentlyContinue
        
        # Crear un ZIP para facilitar la descarga
        Compress-Archive -Path "./output/*" -DestinationPath "./WOWLauncher.zip" -Force
        
        Write-Host "Archivos preparados:"
        Get-ChildItem "./output"
        Write-Host "ZIP creado:"
        Get-ChildItem "./WOWLauncher.zip"

    - name: Upload artifacts (siempre)
      uses: actions/upload-artifact@v3
      with:
        name: WOWLauncher
        path: |
          ./output/
          ./WOWLauncher.zip

    - name: Create Release (solo si hay tag o se solicita manualmente)
      if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
        name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
        body: |
          ## WOWLauncher Build Automático
          
          ### Archivos incluidos:
          - Launcher.exe - Ejecutable principal
          - Archivos de configuración y DLLs necesarios
          - WOWLauncher.zip - Todos los archivos comprimidos
          
          Build realizado: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        files: |
          ./output/*
          ./WOWLauncher.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
