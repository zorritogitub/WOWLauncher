name: Build and Release WOWLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore Launcher/Launcher.sln

    - name: Build solution
      run: msbuild Launcher/Launcher.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Find executable
      run: |
        Write-Host "=== Buscando ejecutable ==="
        $exePath = Get-ChildItem -Path "./Launcher/bin/Release" -Filter "*.exe" | Select-Object -First 1
        
        if ($exePath) {
          Write-Host "✅ Encontrado: $($exePath.FullName)"
          Write-Host "Nombre del archivo: $($exePath.Name)"
          
          # Crear carpeta output
          New-Item -ItemType Directory -Force -Path "./output" | Out-Null
          
          # Copiar el ejecutable
          Copy-Item -Path $exePath.FullName -Destination "./output/Launcher.exe" -Force
          
          # Copiar también archivos necesarios
          Copy-Item -Path "./Launcher/bin/Release/*.dll" -Destination "./output/" -ErrorAction SilentlyContinue
          Copy-Item -Path "./Launcher/bin/Release/*.config" -Destination "./output/" -ErrorAction SilentlyContinue
          
          Write-Host "Archivos en output:" 
          Get-ChildItem "./output"
        } else {
          Write-Error "❌ No se encontró ningún .exe en ./Launcher/bin/Release/"
          Write-Host "Contenido de Release:" 
          Get-ChildItem "./Launcher/bin/Release"
          exit 1
        }

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./output/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
