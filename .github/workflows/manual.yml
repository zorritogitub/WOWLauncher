name: Build and Release WOWLauncher

on:
  push:
    tags:
      - 'v*'  # Se activa automáticamente con tags como v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión para la release (ej: v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore Launcher/Launcher.sln

    - name: Build solution
      run: msbuild Launcher/Launcher.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Prepare release files
      run: |
        Write-Host "=== Preparando archivos para release ===" -ForegroundColor Green
        
        # Crear carpeta para los archivos
        New-Item -ItemType Directory -Force -Path "./release" | Out-Null
        
        # Copiar ejecutable y archivos necesarios
        Write-Host "Copiando ejecutable..." -ForegroundColor Cyan
        Copy-Item -Path "./Launcher/bin/Release/Launcher.exe" -Destination "./release/" -Force
        
        Write-Host "Copiando archivos adicionales..." -ForegroundColor Cyan
        Copy-Item -Path "./Launcher/bin/Release/*.dll" -Destination "./release/" -ErrorAction SilentlyContinue
        Copy-Item -Path "./Launcher/bin/Release/*.config" -Destination "./release/" -ErrorAction SilentlyContinue
        Copy-Item -Path "./Launcher/bin/Release/*.pdb" -Destination "./release/" -ErrorAction SilentlyContinue
        
        # Crear ZIP con todo
        Write-Host "Creando archivo ZIP..." -ForegroundColor Cyan
        Compress-Archive -Path "./release/*" -DestinationPath "./WOWLauncher-$((git describe --tags --abbrev=0) 2>$null || echo 'manual').zip" -Force
        
        # Mostrar archivos preparados
        Write-Host "`n=== Archivos preparados ===" -ForegroundColor Green
        Get-ChildItem "./release"
        Write-Host "`n=== ZIP creado ===" -ForegroundColor Green
        Get-ChildItem "*.zip"

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: WOWLauncher ${{ github.event.inputs.version || github.ref_name }}
        body: |
          # 🚀 WOWLauncher ${{ github.event.inputs.version || github.ref_name }}
          
          ## 📦 Archivos incluidos:
          - **Launcher.exe** - Ejecutable principal
          - **Archivos DLL** - Librerías necesarias
          - **Configuración** - Archivos .config
          
          ## 📥 Descargas:
          - **Individuales**: Puedes descargar cada archivo por separado
          - **ZIP completo**: Archivo comprimido con todo incluido
          
          ## 🔧 Cambios de esta versión:
          *Build automático desde GitHub Actions*
          
          ## 📋 Notas:
          - Fecha de build: ${{ github.event.repository.updated_at }}
          - Commit: ${{ github.sha }}
          - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        files: |
          ./release/*
          ./*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
